name: Build shared libraries

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            library: libsurrealdb_c.so

    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Cargo build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target/${{ matrix.target }}/release
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Build SurrealDB C shared library
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail

          output_dir="dist/surrealdb-libs-${{ matrix.platform }}-${{ matrix.arch }}"
          lib_dir="${output_dir}/lib"
          include_dir="${output_dir}/include"
          release_dir="target/${{ matrix.target }}/release"

          mkdir -p "${lib_dir}" "${include_dir}"
          cp include/surrealdb.h "${include_dir}/"

          library_path="$(find "${release_dir}" "${release_dir}/deps" -maxdepth 1 -type f -name "${{ matrix.library }}" -print -quit)"
          if [[ -z "${library_path}" ]]; then
            echo "Missing ${{ matrix.library }} in ${release_dir}" >&2
            exit 1
          fi
          cp "${library_path}" "${lib_dir}/"

          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            find "${release_dir}" -maxdepth 1 \
              \( -name "surrealdb_c.dll.lib" -o -name "surrealdb_c.lib" -o -name "surrealdb_c.pdb" \) \
              -exec cp {} "${lib_dir}/" \;
          fi

          find "${output_dir}" -type f -print | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: surrealdb-libs-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/surrealdb-libs-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error
